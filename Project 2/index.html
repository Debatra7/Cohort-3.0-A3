<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Cohort 3.0 | A2 | P2</title>
</head>

<body>
    <div class="navbar">
        <div class="logo">
            <span class="squid">SQUID</span>
            <span class="game">GAME<span class="plus">+</span></span>
        </div>
        <ul class="nav-links">
            <li><a href="#">About</a></li>
            <li><a href="#">Watch now</a></li>
            <li><a href="#">Actors</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="hamburger">
            <i class="ri-menu-line"></i>
        </div>
    </div>

    <div class="hero">
        <div class="hero-gradient"></div>

        <div class="hero-bg-text-right">SQUID</div>
        <div class="hero-bg-text">GAME</div>

        <img src="assets/sgc.png" alt="Squid Game Hero" class="hero-image">

        <div class="scroll-indicator">
            <div class="line"></div>
            <span class="scroll-text">SCROLL</span>
        </div>

        <div class="social-icons">
            <i class="ri-twitter-x-line"></i>
            <i class="ri-instagram-line"></i>
            <i class="ri-facebook-line"></i>
        </div>

        <div class="hero-content">
            <div class="big-title">
                <div class="squid-text">
                    SQUID <span class="star-cyan">&#10022;</span>
                </div>
                <div>
                    <span class="star-yellow">&#9670;</span>
                </div>
                <div class="game-text">GAME<span class="minus">—</span></div>
            </div>
            <p class="hero-desc">
                Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                Season 1: 9 Episodes
            </p>
            <div class="hero-buttons">
                <button class="btn-play">
                    <i class="ri-play-fill"></i> Play Now
                </button>
                <button class="btn-trailer">
                    <i class="ri-play-line"></i> Watch Trailer
                </button>
            </div>
        </div>
    </div>

    <div class="thumbnails">
        <div class="thumb">
            <img src="assets/bg.png" alt="Thumb 1">
            <div class="play-btn"><i class="ri-play-fill"></i></div>
        </div>
        <div class="thumb">
            <img src="assets/bg.png" alt="Thumb 2">
            <div class="play-btn"><i class="ri-play-fill"></i></div>
        </div>
        <div class="thumb">
            <img src="assets/bg.png" alt="Thumb 3">
            <div class="play-btn"><i class="ri-play-fill"></i></div>
        </div>
    </div>

</body>

</html>
